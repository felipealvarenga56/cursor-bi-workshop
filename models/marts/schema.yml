version: 2

models:
  - name: dim_customer
    description: "One row per customer."
    columns:
      - name: customer_key
        description: "Surrogate primary key for the customer dimension."
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Natural business key from source."
        tests:
          - unique
          - not_null

  - name: dim_product
    description: "One row per product."
    columns:
      - name: product_key
        description: "Surrogate primary key for the product dimension."
        tests:
          - unique
          - not_null
      - name: product_id
        description: "Natural business key from source."
        tests:
          - unique
          - not_null

  - name: fct_orders
    description: "Order line grain — one row per order line."
    columns:
      - name: order_line_id
        description: "Natural grain key for the fact."
        tests:
          - unique
          - not_null
      - name: customer_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref("dim_customer")
                field: customer_key
      - name: product_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref("dim_product")
                field: product_key
